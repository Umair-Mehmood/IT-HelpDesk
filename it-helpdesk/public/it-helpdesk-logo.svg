<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="url(#logoGrad)"/>
  <!-- Left vertical bar — the "D" stem -->
  <rect x="9" y="9" width="4" height="22" rx="2" fill="white"/>
  <!-- Top bar — full width -->
  <rect x="16" y="9" width="14" height="4" rx="2" fill="white"/>
  <!-- Middle bar — medium -->
  <rect x="16" y="18" width="11" height="4" rx="2" fill="rgba(255,255,255,0.7)"/>
  <!-- Bottom bar — short, with tick accent -->
  <rect x="16" y="27" width="8" height="4" rx="2" fill="rgba(255,255,255,0.45)"/>
  <!-- Tick / check accent on bottom bar -->
  <polyline points="25,28.5 27.5,31 31,26.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
